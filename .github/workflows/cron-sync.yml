# Triggers the Vercel /api/cron/sync endpoint every 5 minutes.
# This replaces Vercel's native cron (locked behind Pro plan for
# sub-daily schedules). The endpoint itself is idempotent — it pulls
# live WC matches, reconciles stuck-IN_PLAY, and resolves predictions.
#
# Required GitHub repo secrets (Settings → Secrets → Actions):
#   CRON_URL     — e.g. https://your-app.vercel.app/api/cron/sync
#   CRON_SECRET  — any random string; must match Vercel env var of same name

name: cron-sync

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:   # lets you run it manually from the Actions tab

jobs:
  hit-endpoint:
    runs-on: ubuntu-latest
    steps:
      - name: Validate secrets
        env:
          CRON_URL: ${{ secrets.CRON_URL }}
        run: |
          # curl's "URL rejected: Malformed input" error means the secret is
          # missing or has whitespace. Fail loudly with a useful message
          # instead of the cryptic curl exit code 3.
          if [ -z "$CRON_URL" ]; then
            echo "::error::CRON_URL secret is empty or unset."
            echo "Set it in: Repo → Settings → Secrets and variables → Actions."
            echo "Example: https://your-app.vercel.app/api/cron/sync"
            exit 1
          fi
          case "$CRON_URL" in
            http://*|https://*) : ;;
            *)
              echo "::error::CRON_URL must start with http(s)://. Got: '$CRON_URL'"
              exit 1
              ;;
          esac

      - name: Ping sync endpoint
        env:
          CRON_URL: ${{ secrets.CRON_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          response=$(curl -sS -w "\nHTTP %{http_code}" \
            -H "Authorization: Bearer $CRON_SECRET" \
            "$CRON_URL")
          echo "$response"
          # Fail the action if the endpoint didn't return 2xx
          echo "$response" | grep -q "HTTP 2" || exit 1
